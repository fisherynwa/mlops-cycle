model:
  name: s(0,15)+l(1)+f(2)
  terms:
  - kind: s
    col: 0
    n_splines: 15
  - kind: l
    col: 1
  - kind: f
    col: 2
data:
  path: data/reference.csv
  target: charges
  test_size: 0.2
gridsearch:
  enabled: true
  lam_min: -2
  lam_max: 0
  lam_num: 50
mlflow:
  tracking_uri: sqlite:///${hydra:runtime.cwd}/mlflow.db
  experiment: insurance_gam
clf: 0.95
seed: 0
