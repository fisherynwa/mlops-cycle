name: drift-check

on:
  workflow_dispatch:
    inputs:
      batch:
        description: production batch to score
        default: data_drift

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      BATCH: ${{ github.event.inputs.batch || 'data_drift' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Generate data and register a champion
        run: |
          uv run python data/data_generating.py
          uv run python -m src.train registry.enabled=true registry.promote=true
      - name: Run the drift monitor
        run: uv run python -m src.monitor --current data/${BATCH}.csv --out reports/report.html
      - uses: actions/upload-artifact@v4
        with:
          name: evidently-report
          path: reports/report.html
      - name: Open an issue if drift detected
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(uv run python -c 'import json;print(json.load(open("summary.json"))["drift_detected"])')" = "True" ]; then
            gh issue create --title "Drift detected on ${BATCH} — retrain challenger" \
              --body "The scheduled monitor flagged drift. See the uploaded Evidently report."
          else
            echo "No drift detected; nothing to do."
          fi