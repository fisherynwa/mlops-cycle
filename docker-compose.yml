services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
      build:
        context: .
        dockerfile: docker/mlflow.Dockerfile
      command: >
        mlflow server --host 0.0.0.0 --port 5000
        --backend-store-uri postgresql://mlflow:mlflow@postgres/mlflow
        --artifacts-destination /artifacts --serve-artifacts
        --allowed-hosts "mlflow:*,localhost:*,127.0.0.1:*"
        --cors-allowed-origins "*"
      volumes:
        - mlflow-artifacts:/artifacts
      ports:
        - "5555:5000"
      depends_on:
        postgres:
          condition: service_healthy

  # One-shot: generate data + train + register the first champion, then exit.
  trainer:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: sh -c "python -m src.train registry.enabled=true registry.promote=true mlflow.tracking_uri=http://mlflow:5000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
    depends_on:
      - mlflow
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: uvicorn src.serve:app --host 0.0.0.0 --port 8000
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AB_MODE: shadow
      SPLIT_FRACTION: "0.10"
      PRED_LOG: /data/predictions.jsonl
    ports:
      - "8000:8000"
    volumes:
      - predictions:/data
    depends_on:
      trainer:
        condition: service_completed_successfully

  # Opt-in (docker compose --profile monitor run monitor): builds an Evidently report.
  monitor:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: python -m src.monitor --current data/prod_concept_smoker.csv --out reports/report.html
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    profiles: ["monitor"]
    depends_on:
      - mlflow

  # Serves the interactive drift explorer and any generated Evidently reports.
  dashboard:
    image: python:3.12-slim
    command: python -m http.server 8080 --directory /site
    ports:
      - "8080:8080"
    volumes:
      - ./web:/site
      - ./reports:/site/reports

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  mlflow-artifacts:
  predictions:
