<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#8a8f98" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .lbl{font-size:15px;font-weight:600;}
      .sub{font-size:12px;}
      .grp{font-size:12px;font-weight:700;letter-spacing:.08em;}
      .edge{stroke:#8a8f98;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <rect x="0" y="0" width="820" height="560" fill="none"/>

  <!-- ===== group frames ===== -->
  <rect x="30" y="60" width="760" height="150" rx="14" fill="#f4f1fb" stroke="#c9bff0" stroke-width="1"/>
  <text x="50" y="84" class="grp" fill="#6b5bb5">TRAINING</text>

  <rect x="30" y="240" width="760" height="130" rx="14" fill="#e9f2fb" stroke="#b4d3f0" stroke-width="1"/>
  <text x="50" y="264" class="grp" fill="#2f6ba3">SERVING</text>

  <rect x="30" y="400" width="760" height="130" rx="14" fill="#fdf3e3" stroke="#f0d29a" stroke-width="1"/>
  <text x="50" y="424" class="grp" fill="#a9761a">OBSERVABILITY</text>

  <!-- ===== title ===== -->
  <text x="30" y="36" font-size="20" font-weight="700" fill="#2c2c2a">insurance-cost-mlops — architecture</text>

  <!-- ===== TRAINING row ===== -->
  <!-- data -->
  <rect x="60" y="110" width="150" height="70" rx="10" fill="#ffffff" stroke="#b4b2a9" stroke-width="1.2"/>
  <text x="135" y="140" text-anchor="middle" class="lbl" fill="#2c2c2a">data / *.csv</text>
  <text x="135" y="160" text-anchor="middle" class="sub" fill="#5f5e5a">synthetic batches</text>

  <!-- trainer -->
  <rect x="270" y="110" width="150" height="70" rx="10" fill="#ffffff" stroke="#7f77dd" stroke-width="1.4"/>
  <text x="345" y="140" text-anchor="middle" class="lbl" fill="#3c3489">trainer</text>
  <text x="345" y="160" text-anchor="middle" class="sub" fill="#5f5e5a">GAM · Hydra · gridsearch</text>

  <!-- mlflow -->
  <rect x="480" y="110" width="150" height="70" rx="10" fill="#ffffff" stroke="#378add" stroke-width="1.4"/>
  <text x="555" y="140" text-anchor="middle" class="lbl" fill="#185fa5">MLflow</text>
  <text x="555" y="160" text-anchor="middle" class="sub" fill="#5f5e5a">tracking + registry</text>

  <!-- postgres -->
  <rect x="640" y="250" width="140" height="60" rx="10" fill="#ffffff" stroke="#b4b2a9" stroke-width="1.2"/>
  <text x="710" y="276" text-anchor="middle" class="lbl" fill="#2c2c2a">Postgres</text>
  <text x="710" y="294" text-anchor="middle" class="sub" fill="#5f5e5a">backend store</text>

  <!-- ===== SERVING row ===== -->
  <!-- user -->
  <rect x="60" y="280" width="150" height="70" rx="10" fill="#ffffff" stroke="#1d9e75" stroke-width="1.4"/>
  <text x="135" y="310" text-anchor="middle" class="lbl" fill="#0f6e56">client</text>
  <text x="135" y="330" text-anchor="middle" class="sub" fill="#5f5e5a">POST /predict</text>

  <!-- api -->
  <rect x="270" y="280" width="150" height="70" rx="10" fill="#ffffff" stroke="#7f77dd" stroke-width="1.4"/>
  <text x="345" y="310" text-anchor="middle" class="lbl" fill="#3c3489">API · FastAPI</text>
  <text x="345" y="330" text-anchor="middle" class="sub" fill="#5f5e5a">loads @champion</text>

  <!-- ===== OBSERVABILITY row ===== -->
  <rect x="270" y="440" width="150" height="66" rx="10" fill="#ffffff" stroke="#ef9f27" stroke-width="1.4"/>
  <text x="345" y="468" text-anchor="middle" class="lbl" fill="#854f0b">Prometheus</text>
  <text x="345" y="487" text-anchor="middle" class="sub" fill="#5f5e5a">scrapes /metrics</text>

  <rect x="480" y="440" width="150" height="66" rx="10" fill="#ffffff" stroke="#ef9f27" stroke-width="1.4"/>
  <text x="555" y="468" text-anchor="middle" class="lbl" fill="#854f0b">Grafana</text>
  <text x="555" y="487" text-anchor="middle" class="sub" fill="#5f5e5a">live dashboards</text>

  <!-- ===== edges ===== -->
  <!-- data -> trainer -->
  <line x1="210" y1="145" x2="266" y2="145" class="edge" marker-end="url(#arr)"/>
  <!-- trainer -> mlflow -->
  <line x1="420" y1="145" x2="476" y2="145" class="edge" marker-end="url(#arr)"/>
  <!-- mlflow -> postgres -->
  <path d="M600 180 C 660 210, 700 220, 710 246" class="edge" marker-end="url(#arr)"/>
  <!-- mlflow -> api (champion) -->
  <path d="M540 180 C 470 215, 400 235, 360 276" class="edge" marker-end="url(#arr)"/>
  <text x="470" y="228" class="sub" fill="#5f5e5a">@champion</text>
  <!-- client -> api -->
  <line x1="210" y1="315" x2="266" y2="315" class="edge" marker-end="url(#arr)"/>
  <!-- api -> prometheus -->
  <path d="M345 350 C 345 385, 345 405, 345 436" class="edge" marker-end="url(#arr)"/>
  <!-- prometheus -> grafana -->
  <line x1="420" y1="473" x2="476" y2="473" class="edge" marker-end="url(#arr)"/>
</svg>
